<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Craic Globe ☘️ — Proof of Pint</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-deep: #0d3d20; --green-mid: #1a6b3a; --green-light: #52C47C;
      --gold: #FFD700; --white: #ffffff; --off-white: #f7f7f5;
      --gray-light: #f0f0ec; --gray-mid: #d0d0c8; --gray-text: #888880;
      --text-dark: #111110;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'DM Sans', -apple-system, sans-serif;
      --radius-md: 14px; --radius-full: 9999px;
    }
    html, body { height: 100%; font-family: var(--font-sans); background: #060a0f; color: var(--text-dark); overflow-x: hidden; }

    /* ── GLOBE ── */
    #globeMap { width: 100%; height: 60vh; min-height: 320px; background: #060a0f; }
    .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }

    /* ── HEADER OVERLAY ── */
    .globe-header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 20px 20px 0;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10; pointer-events: none;
    }
    .globe-logo { font-family: var(--font-serif); font-size: 18px; color: var(--white); }
    .globe-logo span { color: var(--gold); }
    .live-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-full); padding: 6px 14px;
      pointer-events: none;
    }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: livepulse 1.6s ease-in-out infinite; }
    @keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.85)} }
    .live-pill span { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 500; }

    /* ── STATS BAR ── */
    .stats-bar {
      background: var(--green-deep);
      display: flex; justify-content: space-around;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .stat-item { text-align: center; }
    .stat-num { font-family: var(--font-serif); font-size: 22px; color: var(--gold); line-height: 1; }
    .stat-lbl { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── BODY ── */
    .page-body { background: var(--off-white); }

    /* ── LEADERBOARD ── */
    .section { padding: 20px 20px 0; }
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-text); margin-bottom: 12px; }

    .lb-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .lb-tab {
      padding: 6px 14px; border-radius: var(--radius-full);
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1.5px solid var(--gray-mid);
      background: transparent; color: var(--gray-text);
      font-family: var(--font-sans); transition: all 0.15s;
    }
    .lb-tab.active { background: var(--green-deep); color: var(--white); border-color: var(--green-deep); }

    .lb-list { display: flex; flex-direction: column; gap: 0; }
    .lb-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 0; border-bottom: 1px solid var(--gray-light);
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row-left { display: flex; align-items: center; gap: 10px; }
    .lb-rank { font-size: 12px; color: var(--gray-text); width: 22px; font-weight: 600; }
    .lb-rank.gold   { color: #f59e0b; }
    .lb-rank.silver { color: #94a3b8; }
    .lb-rank.bronze { color: #b45309; }
    .lb-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
    .lb-sub  { font-size: 11px; color: var(--gray-text); margin-top: 1px; }
    .lb-count { font-size: 13px; font-weight: 600; color: var(--green-mid); }
    .lb-empty { padding: 20px 0; text-align: center; color: var(--gray-text); font-size: 13px; }

    /* ── FEED ── */
    .feed-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--gray-light); }
    .feed-item:last-child { border-bottom: none; }
    .feed-left { display: flex; align-items: center; gap: 10px; }
    .feed-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
    .feed-pub  { font-size: 11px; color: var(--gray-text); margin-top: 1px; }
    .feed-time { font-size: 11px; color: var(--gray-mid); white-space: nowrap; }

    /* ── CTA ── */
    .cta-bar { padding: 20px; }
    .btn-cta {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 16px 20px;
      background: var(--gold); color: var(--green-deep);
      font-family: var(--font-sans); font-size: 15px; font-weight: 700;
      border: none; border-radius: var(--radius-full); cursor: pointer;
      text-decoration: none; transition: transform 0.12s;
    }
    .btn-cta:active { transform: scale(0.97); }

    /* ── LOADING SKELETON ── */
    .skeleton { background: linear-gradient(90deg, var(--gray-light) 25%, #e8e8e4 50%, var(--gray-light) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skel-row { height: 14px; margin-bottom: 10px; }

    /* ── RELATIVE WRAPPER ── */
    .globe-wrap { position: relative; }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: var(--gray-light); margin: 0 20px; }
    .section-bottom { padding-bottom: 20px; }
  </style>
</head>
<body>

  <div class="globe-wrap">
    <div id="globeMap"></div>
    <div class="globe-header">
      <div class="globe-logo">Craic <span>Globe</span> ☘️</div>
      <div class="live-pill"><div class="live-dot"></div><span id="liveCount">Loading...</span></div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Pints verified</div></div>
    <div class="stat-item"><div class="stat-num" id="statToday">—</div><div class="stat-lbl">Today</div></div>
    <div class="stat-item"><div class="stat-num" id="statCraic">—</div><div class="stat-lbl">$CRAIC earned</div></div>
    <div class="stat-item"><div class="stat-num" id="statCountries">—</div><div class="stat-lbl">Countries</div></div>
  </div>

  <div class="page-body">

    <!-- LEADERBOARD -->
    <div class="section" style="padding-top:20px;">
      <p class="section-label">Leaderboard</p>
      <div class="lb-tabs">
        <button class="lb-tab active" onclick="switchTab('countries')">🌍 Countries</button>
        <button class="lb-tab" onclick="switchTab('counties')">☘️ Counties</button>
        <button class="lb-tab" onclick="switchTab('pubs')">🍺 Pubs</button>
        <button class="lb-tab" onclick="switchTab('players')">👤 Players</button>
      </div>
      <div class="lb-list" id="lbList">
        <div class="skeleton skel-row" style="width:80%"></div>
        <div class="skeleton skel-row" style="width:65%"></div>
        <div class="skeleton skel-row" style="width:72%"></div>
      </div>
    </div>

    <div class="divider" style="margin-top:20px;"></div>

    <!-- LIVE FEED -->
    <div class="section section-bottom" style="padding-top:20px;">
      <p class="section-label">Latest verified pints</p>
      <div id="liveFeed">
        <div class="skeleton skel-row" style="width:90%"></div>
        <div class="skeleton skel-row" style="width:75%"></div>
        <div class="skeleton skel-row" style="width:82%"></div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-bar">
      <a class="btn-cta" href="https://proof-of-pint.vercel.app">🍺 Verify your pint → Earn $CRAIC</a>
    </div>

    <p style="font-size:11px;color:var(--gray-text);text-align:center;padding:0 20px 32px;">
      Proof of Pint · $CRAIC on Base · <a href="https://proof-of-pint.vercel.app" style="color:var(--green-mid);text-decoration:none;">proof-of-pint.vercel.app</a>
    </p>

  </div>

  <script>
  'use strict';

  // ── STATE ──
  let leaderboardData = {};
  let currentTab = 'countries';

  // ── TABS ──
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.lb-tab').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${tab}'`));
    });
    renderLeaderboard(tab);
  }

  function renderLeaderboard(tab) {
    const list = document.getElementById('lbList');
    const data = leaderboardData[tab] || [];
    if (!data.length) {
      list.innerHTML = '<div class="lb-empty">No data yet — be the first! 🍺</div>';
      return;
    }
    const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const rankLabel = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;

    list.innerHTML = data.map((item, i) => {
      const name = item.name || '—';
      const count = item.count || item.pints || 0;
      const craic = (count * 5000).toLocaleString();
      return `
        <div class="lb-row">
          <div class="lb-row-left">
            <span class="lb-rank ${rankClass(i)}">${rankLabel(i)}</span>
            <div>
              <div class="lb-name">${name}</div>
              <div class="lb-sub">${count} pint${count !== 1 ? 's' : ''}</div>
            </div>
          </div>
          <div class="lb-count">${craic} $CRAIC</div>
        </div>`;
    }).join('');
  }

  // ── FEED ──
  function timeAgo(d) {
    const m = Math.floor((Date.now() - d) / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  function renderFeed(pints) {
    const feed = document.getElementById('liveFeed');
    const flags = {IE:'🇮🇪',GB:'🇬🇧',US:'🇺🇸',AU:'🇦🇺',DE:'🇩🇪',CA:'🇨🇦',FR:'🇫🇷',NZ:'🇳🇿',ZA:'🇿🇦',AE:'🇦🇪'};
    const sorted = [...pints].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 8);
    if (!sorted.length) {
      feed.innerHTML = '<div class="lb-empty">Be the first to verify a pint! ☘️</div>';
      return;
    }
    feed.innerHTML = sorted.map(p => `
      <div class="feed-item">
        <div class="feed-left">
          <span style="font-size:18px">${flags[p.country_code] || '🍺'}</span>
          <div>
            <div class="feed-name">${p.pub || 'Irish pub'}</div>
            <div class="feed-pub">${[p.county, p.country].filter(Boolean).join(', ')}</div>
          </div>
        </div>
        <div class="feed-time">${p.timestamp ? timeAgo(new Date(p.timestamp)) : ''}</div>
      </div>`).join('');
  }

  // ── GLOBE ──
  async function initGlobe() {
    try {
      const cfg = await fetch('/api/config').then(r => r.json());
      if (!cfg.mapboxToken) { console.warn('No Mapbox token'); return; }
      mapboxgl.accessToken = cfg.mapboxToken;
    } catch (e) { console.error('Config fetch failed:', e); return; }

    const map = new mapboxgl.Map({
      container: 'globeMap',
      style: 'mapbox://styles/mapbox/dark-v11',
      projection: 'globe',
      zoom: 1.5,
      center: [0, 20],
      pitch: 0,
      bearing: 0,
      attributionControl: false,
      interactive: false,
    });

    map.on('style.load', () => {
      map.setFog({
        color: 'rgb(4,8,14)', 'high-color': 'rgb(6,20,40)',
        'horizon-blend': 0.04, 'space-color': 'rgb(4,8,14)', 'star-intensity': 0.6
      });
    });

    let lng = 0;
    function rotate() {
      lng = (lng + 0.15) % 360;
      map.setCenter([lng - 180, 20]);
      requestAnimationFrame(rotate);
    }
    map.on('load', () => { rotate(); });

    return map;
  }

  // ── PIN IMAGE ──
  function makePinCanvas(logoImg) {
    const c = document.createElement('canvas'); c.width = 32; c.height = 48;
    const ctx = c.getContext('2d');
    ctx.beginPath(); ctx.moveTo(14,22); ctx.lineTo(18,22); ctx.lineTo(16.5,46); ctx.lineTo(15.5,46); ctx.closePath();
    ctx.fillStyle = '#cc2200'; ctx.fill();
    ctx.beginPath(); ctx.arc(16,13,11,0,Math.PI*2); ctx.fillStyle = '#52C47C'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
    if (logoImg) { ctx.save(); ctx.beginPath(); ctx.arc(16,13,8.5,0,Math.PI*2); ctx.clip(); ctx.drawImage(logoImg,7.5,4.5,17,17); ctx.restore(); }
    ctx.beginPath(); ctx.arc(12,9,2.5,0,Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fill();
    return c;
  }

  function loadPinImage(map) {
    return new Promise(resolve => {
      if (map.hasImage('pin-green')) { resolve(); return; }
      const logo = new Image(); logo.crossOrigin = 'anonymous';
      const done = img => {
        const c = makePinCanvas(img);
        map.addImage('pin-green', { width:32, height:48, data: new Uint8Array(c.getContext('2d').getImageData(0,0,32,48).data.buffer) }, { sdf: false });
        resolve();
      };
      logo.onload = () => done(logo);
      logo.onerror = () => done(null);
      logo.src = 'https://proof-of-pint.vercel.app/craic.png?v=' + Date.now();
    });
  }

  function setupPins(map, pints) {
    const features = pints
      .filter(p => p.pub_lat && p.pub_lng)
      .map(p => ({ type:'Feature', geometry:{ type:'Point', coordinates:[p.pub_lng, p.pub_lat] }, properties:{ pub: p.pub } }));

    if (map.getSource('pints')) {
      map.getSource('pints').setData({ type:'FeatureCollection', features });
      return;
    }
    map.addSource('pints', { type:'geojson', data:{ type:'FeatureCollection', features }, cluster:true, clusterMaxZoom:10, clusterRadius:40 });
    map.addLayer({ id:'clusters', type:'circle', source:'pints', filter:['has','point_count'], paint:{ 'circle-color':'#52C47C', 'circle-radius':['step',['get','point_count'],14,5,18,20,22], 'circle-opacity':0.9, 'circle-stroke-width':2, 'circle-stroke-color':'rgba(255,255,255,0.5)' } });
    map.addLayer({ id:'cluster-count', type:'symbol', source:'pints', filter:['has','point_count'], layout:{ 'text-field':'{point_count_abbreviated}', 'text-size':12 }, paint:{ 'text-color':'#060a0f' } });
    map.addLayer({ id:'pins', type:'symbol', source:'pints', filter:['!',['has','point_count']], layout:{ 'icon-image':'pin-green', 'icon-size':0.55, 'icon-allow-overlap':true, 'icon-anchor':'bottom' } });
  }

  // ── MAIN DATA LOAD ──
  async function loadData(map) {
    try {
      const [pr, sr] = await Promise.all([fetch('/api/pints'), fetch('/api/stats')]);
      const pj = await pr.json();
      const sj = await sr.json();

      const pints = pj.pints || [];
      const total = sj.total_pints || pints.length || 0;

      // Live count pill
      const liveEl = document.getElementById('liveCount');
      if (liveEl) liveEl.textContent = total.toLocaleString() + ' pints verified worldwide';

      // Stats bar
      document.getElementById('statTotal').textContent    = total.toLocaleString();
      document.getElementById('statToday').textContent    = (sj.today_pints || 0).toLocaleString();
      document.getElementById('statCraic').textContent    = ((sj.total_craic || total * 5000) / 1000).toFixed(0) + 'K';
      document.getElementById('statCountries').textContent = (sj.countries_count || 0).toLocaleString();

      // Leaderboards
      leaderboardData = pj.leaderboards || {};
      renderLeaderboard(currentTab);

      // Feed
      renderFeed(pints);

      // Globe pins
      if (map) {
        const tryPins = () => loadPinImage(map).then(() => setupPins(map, pints));
        if (map.isStyleLoaded()) tryPins(); else map.on('style.load', tryPins);
      }

    } catch (err) {
      console.warn('Data load error:', err);
      document.getElementById('liveCount').textContent = 'Pints verified worldwide';
    }
  }

  // ── BOOT ──
  (async () => {
    const map = await initGlobe();
    await loadData(map);
    setInterval(() => loadData(map), 30000);
  })();
  </script>
</body>
</html>
